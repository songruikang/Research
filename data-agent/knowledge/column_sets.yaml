# L2 列集合提示 — 轻量引导，不强制
# 注意：只在问题明确涉及"信息"/"详情"时才参考，聚合查询不要额外加列

column_sets:
  # ═══ 仅当问题要求"查信息/详情"时参考，聚合统计类不要用 ═══
  - trigger: ["设备信息", "网元信息", "设备详情"]
    note: "当问题明确要求'设备信息/详情'时，返回: ne_id, ne_name, vendor, model, role, oper_status。否则只返回问题需要的列"

  - trigger: ["VPN业务信息", "VPN详情", "业务信息"]
    note: "当问题明确要求'VPN业务信息/详情'时，返回: vpn_id, vpn_name, customer_name, service_level。否则只返回问题需要的列"

  - trigger: ["站点信息", "站点详情"]
    note: "当问题明确要求'站点信息/详情'时，返回: site_id, site_name, region, city, tier"

  # ═══ 聚合查询的分组维度提示 ═══
  - trigger: ["按客户统计", "每个客户"]
    note: "客户维度聚合时，GROUP BY 同时包含 customer_id 和 customer_name"

  - trigger: ["按区域统计", "每个区域"]
    note: "区域来自 t_site.region，需要 JOIN t_site"

  # ═══ 关键原则 ═══
  - trigger: []
    note: "重要：不要返回问题没有要求的列。'统计数量'只需分组维度+COUNT，'平均功耗'只需设备名+AVG值。仔细看问题要求了什么就返回什么"
